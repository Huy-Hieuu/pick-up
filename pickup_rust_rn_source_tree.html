let cp='all';
let col=new Set();

function flat(nodes,depth,pp){
  let r=[];
  for(const n of nodes){
    const path=pp+'/'+n.n;
    const isF=!!n.f;
    const isC=col.has(path);
    r.push({...n,depth,path,isF,isC});
    if(isF&&n.ch&&!isC) r=r.concat(flat(n.ch,depth+1,path));
  }
  return r;
}

function vis(phase,row){
  if(phase==='all')return true;
  const p=parseInt(phase);
  return row.isF?hasChild(row,p):row.p<=p;
}

function hasChild(n,p){
  if(!n.f)return n.p<=p;
  if(n.p<=p)return true;
  if(!n.ch)return false;
  return n.ch.some(c=>hasChild(c,p));
}

function cnt(nodes){
  let c={1:0,2:0,3:0,4:0,fo:0,fi:0};
  (function w(l){for(const n of l){if(n.f){c.fo++;if(n.ch)w(n.ch)}else{c.fi++;c[n.p]=(c[n.p]||0)+1}}})(nodes);
  return c;
}

function render(){
  const rows=flat(D[0].ch,0,'');
  const el=document.getElementById('tree');
  let h='';

  const rootC=col.has('/pickup/');
  h+=`<div class="row" style="background:var(--color-background-secondary)">
    <span class="toggle ${rootC?'collapsed':''}" onclick="tf('/pickup/')">${CH}</span>
    <span class="icon">${FI}</span>
    <span class="fname" style="font-weight:500;font-family:var(--font-sans)">pickup/</span>
    <span class="badge b1">P1</span>
    <span class="desc">Monorepo root</span>
  </div>`;

  let lastSep='';
  for(const row of rows){
    const v=vis(cp,row);
    const ind=row.depth*18;
    const badge=row.p?`<span class="badge b${row.p}">P${row.p}</span>`:'';
    const desc=row.d?`<span class="desc">${row.d}</span>`:'';
    const icon=row.isF?FI:FL;
    const tog=row.isF&&row.ch&&row.ch.length?`<span class="toggle ${row.isC?'collapsed':''}" onclick="tf('${row.path}')">${CH}</span>`:'<span style="width:16px;flex-shrink:0"></span>';

    let sep='';
    if(row.sep&&row.sep!==lastSep&&v){
      sep=`<div class="row sep ${v?'':'hidden'}"><span class="section-label">${row.sep}</span></div>`;
      lastSep=row.sep;
    }

    h+=sep+`<div class="row ${row.isF?'folder-row':''} ${v?'':'hidden'}">
      <span class="indent" style="width:${ind}px"></span>
      ${tog}
      <span class="icon">${icon}</span>
      <span class="fname">${row.n}</span>
      ${badge}${desc}
    </div>`;
  }
  el.innerHTML=h;

  const c=cnt(D[0].ch);
  document.getElementById('stats').innerHTML=`
    <span><span class="stat-val">${c.fo}</span> folders</span>
    <span><span class="stat-val">${c.fi}</span> files</span>
    <span><span class="stat-val">${c[1]}</span> P1</span>
    <span><span class="stat-val">${c[2]}</span> P2</span>
    <span><span class="stat-val">${c[3]}</span> P3</span>
    <span><span class="stat-val">${c[4]}</span> P4</span>`;
}

function fp(p){
  cp=p;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.p===p));
  render();
}
function tf(path){
  col.has(path)?col.delete(path):col.add(path);
  render();
}
render();
</script>
