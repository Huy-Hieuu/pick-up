version: "3.9"

services:
  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: pickup-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pickup
      POSTGRES_PASSWORD: pickup
      POSTGRES_DB: pickup
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pickup"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis (OTP, rate limiting, caching) ────────────────────────
  redis:
    image: redis:7-alpine
    container_name: pickup-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── MinIO (S3-compatible storage) ────────────────────────────
  minio:
    image: minio/minio
    container_name: pickup-minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
      - ./scripts/init-mc.sh:/init-mc.sh:ro
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── PickUp API server ────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: pickup-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      RUST_LOG: info,pickup_server=debug
      DATABASE_URL: postgres://pickup:pickup@postgres:5432/pickup
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-change-in-prod
      JWT_ACCESS_TTL_MINUTES: 15
      JWT_REFRESH_TTL_DAYS: 30
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: pickup-media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  miniodata:
